<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computing History Agent</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💻</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="background">
        <div class="container" role="main">
            <!-- Header -->
            <header class="header" role="banner">
                <div class="header-content">
                    <span class="header-icon" aria-hidden="true">💻</span>
                    <div class="header-text">
                        <h1 class="header-title">Computing History Agent</h1>
                        <p class="header-subtitle">Powered by Microsoft Foundry</p>
                    </div>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-container" role="region" aria-label="Chat conversation area">
                <div class="chat-toolbar" role="toolbar" aria-label="Chat controls">
                    <!-- Inline clear confirmation -->
                    <div id="clearConfirm" class="clear-confirm" hidden aria-live="polite">
                        <span class="clear-confirm-text">Clear chat history?</span>
                        <button id="clearConfirmYes" class="clear-confirm-btn yes" aria-label="Yes, clear history">Yes</button>
                        <button id="clearConfirmNo" class="clear-confirm-btn no" aria-label="No, keep history">No</button>
                    </div>
                    <button id="themeToggleBtn" class="toolbar-btn" title="Toggle dark / light mode"
                        aria-label="Toggle dark mode" tabindex="4">
                        <span aria-hidden="true" id="themeIcon">🌙</span>
                    </button>
                    <button id="resetBtn" class="toolbar-btn" title="Clear chat history"
                        aria-label="Clear conversation" tabindex="3">
                        <span aria-hidden="true">🗑️</span>
                    </button>
                </div>
                <div id="chatMessages" class="chat-messages" role="log" aria-live="polite" aria-atomic="false"
                    aria-label="Chat messages">
                    <div class="welcome-message" role="status">
                        <p>Let's chat about computing history...</p>
                        <div class="quick-prompts" aria-label="Suggested questions">
                            <p class="quick-prompts-label">Try asking:</p>
                            <div class="quick-prompts-chips">
                                <button class="prompt-chip" data-prompt="What was the first computer ever built?">What was the first computer?</button>
                                <button class="prompt-chip" data-prompt="Tell me about the history of the internet">History of the internet</button>
                                <button class="prompt-chip" data-prompt="Who invented the transistor and why was it important?">Who invented the transistor?</button>
                                <button class="prompt-chip" data-prompt="What is Moore's Law and is it still relevant today?">What is Moore's Law?</button>
                                <button class="prompt-chip" data-prompt="Tell me about the history of personal computers in the 1980s">Personal computers in the 1980s</button>
                                <button class="prompt-chip" data-prompt="Who were the pioneers of software programming?">Pioneers of software programming</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container" role="form" aria-label="Message input form">
                <label for="messageInput" class="sr-only">Type your message</label>
                <input type="text" id="messageInput" class="message-input" placeholder="Ask about computing history…"
                    autocomplete="off" aria-label="Message input field" aria-describedby="inputHelp" tabindex="1"
                    maxlength="10000">
                <button id="sendBtn" class="send-btn" title="Send message" aria-label="Send message" tabindex="2">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>

            <!-- Footer -->
            <footer class="footer" role="contentinfo">
                <span id="inputHelp">AI-generated content can include mistakes</span>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
